<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VarnishCalc PRO - Global Support Edition</title>
    <style>
        :root {
            --bg: #050a18;
            --card-bg: rgba(255, 255, 255, 0.07);
            --border: rgba(255, 255, 255, 0.12);
            --accent-cyan: #06b6d4;
            --accent-green: #34d399;
            --accent-blue: #60a5fa;
            --text: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.5);
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 500px; }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 { font-size: 22px; font-weight: 800; text-align: center; margin-bottom: 20px; color: var(--accent-cyan); letter-spacing: 1px; }

        label { display: block; font-size: 11px; color: var(--text-dim); text-transform: uppercase; margin: 0 0 5px 5px; font-weight: 600; }

        select, input {
            width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--border);
            padding: 12px; border-radius: 12px; color: white; margin-bottom: 15px;
            font-size: 16px; box-sizing: border-box; outline: none;
        }

        input:focus { border-color: var(--accent-cyan); }

        .btn-run {
            width: 100%; padding: 18px; border-radius: 14px; border: none;
            background: linear-gradient(135deg, #0ea5e9, #2563eb);
            color: white; font-weight: 800; font-size: 16px; cursor: pointer;
            text-transform: uppercase; margin-top: 10px;
        }

        /* --- VÝSLEDKOVÁ TABULKA - ANALYTICKÝ DESIGN --- */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th { text-align: left; color: var(--text-dim); padding: 10px 5px; border-bottom: 1px solid var(--border); font-size: 10px; }
        td { padding: 12px 5px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .param-name { font-weight: 500; color: #cbd5e1; }
        .val-min { color: var(--accent-green); font-weight: 700; font-family: 'JetBrains Mono', monospace; text-align: right; }
        .val-max { color: var(--accent-blue); font-weight: 700; font-family: 'JetBrains Mono', monospace; text-align: right; }
        .unit-label { font-size: 9px; color: var(--text-dim); margin-left: 3px; font-weight: normal; }

        .highlight-row { background: rgba(6, 182, 212, 0.1); }
        .highlight-row td { border-bottom: 1px solid var(--accent-cyan); }

        .area-display {
            text-align: center; margin-bottom: 20px; padding: 15px;
            background: rgba(0,0,0,0.2); border-radius: 15px; border: 1px dashed var(--border);
        }
        .area-val { font-size: 24px; font-weight: 800; color: var(--accent-cyan); }
    </style>
</head>
<body>

<div class="container">
    <h1>VARNISH<b>CALC</b> <span style="font-weight:300; opacity:0.6">SUPPORT</span></h1>

    <div class="glass-card">
        <label>Aplikační proces</label>
        <select id="coatingType" onchange="updateList()">
            <option value="internal">Vnitřní lakování (vč. dna)</option>
            <option value="external">Vnější lakování / Potisk</option>
        </select>

        <label>Výběr laku / Barvy</label>
        <select id="varnishSelect"></select>

        <div style="display: flex; gap: 10px;">
            <div style="flex:1">
                <label>Průměr Ø (mm)</label>
                <input type="number" id="diam" value="35" step="0.1">
            </div>
            <div style="flex:1">
                <label>Délka L (mm)</label>
                <input type="number" id="len" value="150" step="1">
            </div>
        </div>

        <button class="btn-run" onclick="calculate()">Provést analýzu</button>
    </div>

    <div id="results" class="glass-card" style="display:none;">
        <div id="resOutput"></div>
    </div>
</div>

<script>
// Databáze laků (TDS parametry)
const db = {
    internal: [
        { name: "RLC15031 (PAM Alt)", sc: 36.0, wetD: 1.12, dryD: 1.37, minT: 7, maxT: 11 },
        { name: "RLC10031/4 (BPANI)", sc: 39.91, wetD: 1.03, dryD: 1.26, minT: 6, maxT: 10 },
        { name: "32S23MC", sc: 25.60, wetD: 1.00, dryD: 1.25, minT: 5, maxT: 11 }
    ],
    external: [
        { name: "PFASNi (B 40) Overvarnish", sc: 59.1, wetD: 1.04, dryD: 1.23, minT: 10, maxT: 13 },
        { name: "WHITE ENAMEL T1195", sc: 95.6, wetD: 1.47, dryD: 1.98, minT: 10, maxT: 20 },
        { name: "CLEAR SIZECOAT 72", sc: 58.5, wetD: 1.02, dryD: 1.17, minT: 4, maxT: 7 }
    ]
};

function updateList() {
    const type = document.getElementById('coatingType').value;
    const sel = document.getElementById('varnishSelect');
    sel.innerHTML = db[type].map(v => `<option value='${JSON.stringify(v)}'>${v.name}</option>`).join('');
}

function calculate() {
    const v = JSON.parse(document.getElementById('varnishSelect').value);
    const d = parseFloat(document.getElementById('diam').value);
    const l = parseFloat(document.getElementById('len').value);
    const type = document.getElementById('coatingType').value;

    // 1. Plocha (Geometrie tuby)
    const sideArea = Math.PI * d * l;
    const bottomArea = (Math.PI * Math.pow(d, 2)) / 4;
    const totalAreaMm2 = (type === 'internal') ? (sideArea + bottomArea) : sideArea;
    const areaCm2 = totalAreaMm2 / 100;
    const areaM2 = totalAreaMm2 / 1000000;

    // 2. Výpočetní konstanty
    const scv = (v.sc / 100) * (v.wetD / v.dryD) * 100; // Solid Content by Volume

    const getMetrics = (thick) => {
        const dryGm2 = thick * v.dryD;              // g/m2
        const wetGm2 = (dryGm2 / (v.sc / 100));     // g/m2
        const wetThick = thick * (100 / scv);       // µm mokrá
        const dryG = dryGm2 * areaM2;               // g/kus
        const wetG = wetGm2 * areaM2;               // g/kus
        return { thick, wetThick, dryGm2, wetGm2, dryG, wetG };
    };

    const min = getMetrics(v.minT);
    const max = getMetrics(v.maxT);

    document.getElementById('resOutput').innerHTML = `
        <div class="area-display">
            <div class="area-val">${areaCm2.toFixed(2)} cm²</div>
            <div style="font-size:10px; color:var(--text-dim); margin-top:5px">VÝPOČTOVÁ PLOCHA LAKOVÁNÍ</div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>PARAMETR</th>
                    <th style="text-align:right">MIN (${v.minT}µ)</th>
                    <th style="text-align:right">MAX (${v.maxT}µ)</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td class="param-name">Tloušťka suchá</td>
                    <td class="val-min">${min.thick.toFixed(1)}<span class="unit-label">µm</span></td>
                    <td class="val-max">${max.thick.toFixed(1)}<span class="unit-label">µm</span></td>
                </tr>
                <tr>
                    <td class="param-name">Tloušťka mokrá</td>
                    <td class="val-min">${min.wetThick.toFixed(1)}<span class="unit-label">µm</span></td>
                    <td class="val-max">${max.wetThick.toFixed(1)}<span class="unit-label">µm</span></td>
                </tr>
                <tr>
                    <td class="param-name">Suché gramy / m²</td>
                    <td class="val-min">${min.dryGm2.toFixed(2)}<span class="unit-label">g</span></td>
                    <td class="val-max">${max.dryGm2.toFixed(2)}<span class="unit-label">g</span></td>
                </tr>
                <tr>
                    <td class="param-name">Mokré gramy / m²</td>
                    <td class="val-min">${min.wetGm2.toFixed(2)}<span class="unit-label">g</span></td>
                    <td class="val-max">${max.wetGm2.toFixed(2)}<span class="unit-label">g</span></td>
                </tr>
                <tr class="highlight-row">
                    <td class="param-name" style="color:white">Suchá váha / kus</td>
                    <td class="val-min">${min.dryG.toFixed(4)}<span class="unit-label">g</span></td>
                    <td class="val-max">${max.dryG.toFixed(4)}<span class="unit-label">g</span></td>
                </tr>
                <tr class="highlight-row">
                    <td class="param-name" style="color:white">Mokrá váha / kus</td>
                    <td class="val-min">${min.wetG.toFixed(4)}<span class="unit-label">g</span></td>
                    <td class="val-max">${max.wetG.toFixed(4)}<span class="unit-label">g</span></td>
                </tr>
            </tbody>
        </table>
        
        <div style="margin-top:20px; font-size:10px; color:var(--text-dim); text-align:center">
            Kontrolní sušina (objemová) SCV: ${scv.toFixed(2)}%
        </div>
    `;

    document.getElementById('results').style.display = 'block';
}

// Inicializace
updateList();
</script>
</body>
</html>
