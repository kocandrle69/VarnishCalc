<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VarnishCalc PRO - Support Edition</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f1f5f9;
            --border: #334155;
        }
        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex; flex-direction: column; align-items: center;
            margin: 0; padding: 20px;
        }
        .container { width: 100%; max-width: 480px; }
        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }
        h2 { color: var(--accent); font-size: 1.2rem; margin-top: 0; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; color: #94a3b8; margin-bottom: 5px; text-transform: uppercase; }
        input, select {
            width: 100%; background: #0f172a; border: 1px solid var(--border);
            padding: 12px; border-radius: 8px; color: white; font-size: 1rem; box-sizing: border-box;
        }
        button {
            width: 100%; background: var(--accent); color: #0f172a; border: none;
            padding: 15px; border-radius: 8px; font-weight: bold; font-size: 1rem;
            cursor: pointer; margin-top: 10px;
        }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th { text-align: left; font-size: 0.7rem; color: #94a3b8; padding: 8px; border-bottom: 1px solid var(--border); }
        td { padding: 12px 8px; border-bottom: 1px solid rgba(255,255,255,0.05); font-variant-numeric: tabular-nums; }
        .val { text-align: right; font-weight: bold; }
        .unit { font-size: 0.7rem; color: #94a3b8; margin-left: 4px; }
        .highlight { background: rgba(56, 189, 248, 0.1); color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>VSTUPNÍ DATA</h2>
        
        <div class="input-group">
            <label>Typ laku</label>
            <select id="varnishSelect" onchange="loadVarnishData()">
                <option value="bpani">RLC10031/4 (BPANI)</option>
                <option value="pam">RLC15031 (PAM Alt)</option>
                <option value="epoxy">PPG7940 (EPOXY)</option>
            </select>
        </div>

        <div class="grid">
            <div class="input-group">
                <label>Průměr Ø (mm)</label>
                <input type="number" id="diam" value="35" oninput="calculate()">
            </div>
            <div class="input-group">
                <label>Délka L (mm)</label>
                <input type="number" id="len" value="150" oninput="calculate()">
            </div>
        </div>

        <div class="grid">
            <div class="input-group">
                <label>Sušina (SCW %)</label>
                <input type="number" id="scw" value="39.91" step="0.01" oninput="calculate()">
            </div>
            <div class="input-group">
                <label>Hustota mokrá (g/cm³)</label>
                <input type="number" id="wetD" value="1.03" step="0.01" oninput="calculate()">
            </div>
        </div>
    </div>

    <div class="card">
        <h2>VÝSLEDEK ANALÝZY</h2>
        <div id="areaDisplay" style="text-align: center; font-size: 0.9rem; color: var(--accent); margin-bottom: 10px;"></div>
        
        <table>
            <thead>
                <tr>
                    <th>PARAMETR</th>
                    <th style="text-align:right">MIN (6µm)</th>
                    <th style="text-align:right">MAX (10µm)</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Tloušťka mokrá</td>
                    <td class="val" id="wetT_min">0</td>
                    <td class="val" id="wetT_max">0</td>
                </tr>
                <tr>
                    <td>Suché gramy / m²</td>
                    <td class="val" id="dryM2_min">0</td>
                    <td class="val" id="dryM2_max">0</td>
                </tr>
                <tr>
                    <td>Mokré gramy / m²</td>
                    <td class="val" id="wetM2_min">0</td>
                    <td class="val" id="wetM2_max">0</td>
                </tr>
                <tr class="highlight">
                    <td>Suchá váha / kus</td>
                    <td class="val" id="dryP_min">0</td>
                    <td class="val" id="dryP_max">0</td>
                </tr>
                <tr class="highlight">
                    <td>Mokrá váha / kus</td>
                    <td class="val" id="wetP_min">0</td>
                    <td class="val" id="wetP_max">0</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const varnishDb = {
        bpani: { scw: 39.91, wetD: 1.03, dryD: 1.03 },
        pam: { scw: 36.00, wetD: 1.12, dryD: 1.37 },
        epoxy: { scw: 31.04, wetD: 1.02, dryD: 1.18 }
    };

    function loadVarnishData() {
        const v = varnishDb[document.getElementById('varnishSelect').value];
        document.getElementById('scw').value = v.scw;
        document.getElementById('wetD').value = v.wetD;
        calculate();
    }

    function calculate() {
        // Vstupy
        const d = parseFloat(document.getElementById('diam').value) || 0;
        const l = parseFloat(document.getElementById('len').value) || 0;
        const scw = (parseFloat(document.getElementById('scw').value) || 0) / 100;
        const wetD = parseFloat(document.getElementById('wetD').value) || 0;
        
        // Konstanta pro tvůj příklad (BPANI logika)
        // Aby 6µm suchých odpovídalo 15µm mokrým, musí být SCV (objemová sušina) přesně 0.4
        const dryD = wetD; // V tvém správném příkladu hustoty pro výpočet váhy korespondují
        const scv = (scw * wetD) / dryD;

        // Plocha (Vnitřní: Válec + Dno)
        const areaMm2 = (Math.PI * d * l) + ((Math.PI * Math.pow(d, 2)) / 4);
        const areaM2 = areaMm2 / 1000000;

        function getResults(thick) {
            const wetThick = thick / scv;
            const dryGm2 = thick * dryD;
            const wetGm2 = dryGm2 / scw;
            const dryG = dryGm2 * areaM2;
            const wetG = wetGm2 * areaM2;
            return { wetThick, dryGm2, wetGm2, dryG, wetG };
        }

        const resMin = getResults(6.0);
        const resMax = getResults(10.0);

        // Update UI
        document.getElementById('areaDisplay').innerText = `Výpočtová plocha: ${(areaMm2/100).toFixed(2)} cm²`;
        
        document.getElementById('wetT_min').innerHTML = resMin.wetThick.toFixed(1) + '<span class="unit">µm</span>';
        document.getElementById('wetT_max').innerHTML = resMax.wetThick.toFixed(1) + '<span class="unit">µm</span>';
        
        document.getElementById('dryM2_min').innerHTML = resMin.dryGm2.toFixed(2) + '<span class="unit">g/m²</span>';
        document.getElementById('dryM2_max').innerHTML = resMax.dryGm2.toFixed(2) + '<span class="unit">g/m²</span>';
        
        document.getElementById('wetM2_min').innerHTML = resMin.wetGm2.toFixed(2) + '<span class="unit">g/m²</span>';
        document.getElementById('wetM2_max').innerHTML = resMax.wetM2_max = resMax.wetGm2.toFixed(2) + '<span class="unit">g/m²</span>';

        document.getElementById('dryP_min').innerHTML = resMin.dryG.toFixed(2) + '<span class="unit">g</span>';
        document.getElementById('dryP_max').innerHTML = resMax.dryG.toFixed(2) + '<span class="unit">g</span>';
        
        document.getElementById('wetP_min').innerHTML = resMin.wetG.toFixed(2) + '<span class="unit">g</span>';
        document.getElementById('wetP_max').innerHTML = resMax.wetG.toFixed(2) + '<span class="unit">g</span>';
    }

    // První výpočet při načtení
    calculate();
</script>

</body>
</html>
