<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VarnishCalc PRO - Funkční Diagnostika</title>
    <style>
        :root {
            --bg: #0a0f1e;
            --card: rgba(255, 255, 255, 0.08);
            --accent: #00d4ff;
            --border: rgba(255, 255, 255, 0.15);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 100%; max-width: 450px; }
        .card {
            background: var(--card);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 20px;
        }
        h2 { color: var(--accent); font-size: 18px; margin-top: 0; text-align: center; }
        label { display: block; font-size: 12px; color: #aaa; margin: 10px 0 5px 5px; }
        input, select {
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border);
            background: rgba(0,0,0,0.3); color: white; font-size: 16px; box-sizing: border-box;
        }
        button {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            background: linear-gradient(135deg, #0072ff, #00d4ff);
            color: white; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 15px;
        }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { font-size: 11px; color: #888; text-align: right; padding: 8px; border-bottom: 1px solid var(--border); }
        td { padding: 10px 8px; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: right; font-size: 14px; }
        td:first-child { text-align: left; color: #ccc; font-size: 13px; }
        .res-bold { font-weight: bold; color: var(--accent); }
        .highlight { background: rgba(0, 212, 255, 0.1); }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>VSTUPNÍ PARAMETRY</h2>
        
        <label>Lak (Modelový příklad)</label>
        <select id="varnish">
            <option value="custom">Manuální zadání (dle tvého příkladu)</option>
        </select>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div>
                <label>Průměr Ø (mm)</label>
                <input type="number" id="diam" value="35">
            </div>
            <div>
                <label>Délka L (mm)</label>
                <input type="number" id="len" value="150">
            </div>
        </div>

        <label>Váhová sušina (SCW %)</label>
        <input type="number" id="scw" value="39.91" step="0.01">

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div>
                <label>Hustota mokrá (g/cm³)</label>
                <input type="number" id="wetD" value="1.03" step="0.01">
            </div>
            <div>
                <label>Hustota suchá (g/cm³)</label>
                <input type="number" id="dryD" value="1.03" step="0.01">
            </div>
        </div>
        
        <button onclick="calculate()">SPOČÍTAT ANALÝZU</button>
    </div>

    <div class="card" id="resultsCard" style="display:none;">
        <h2>VÝSLEDKY ANALÝZY</h2>
        <div id="areaInfo" style="text-align:center; font-size:12px; margin-bottom:10px; color:#00d4ff;"></div>
        <table>
            <thead>
                <tr>
                    <th>PARAMETR</th>
                    <th>MIN (6µ)</th>
                    <th>MAX (10µ)</th>
                </tr>
            </thead>
            <tbody id="resBody">
                </tbody>
        </table>
    </div>
</div>

<script>
function calculate() {
    // Vstupy
    const d = parseFloat(document.getElementById('diam').value);
    const l = parseFloat(document.getElementById('len').value);
    const scw = parseFloat(document.getElementById('scw').value) / 100;
    const wetD = parseFloat(document.getElementById('wetD').value);
    const dryD = parseFloat(document.getElementById('dryD').value);

    // Limity tloušťky (dle tvého zadání)
    const tMin = 6.0;
    const tMax = 10.0;

    // 1. Výpočet plochy (Vnitřní lak: Plášť + Dno)
    const sideArea = Math.PI * d * l;
    const bottomArea = (Math.PI * Math.pow(d, 2)) / 4;
    const totalAreaMm2 = sideArea + bottomArea;
    const areaM2 = totalAreaMm2 / 1,000,000;

    // 2. Výpočet objemové sušiny (SCV) - Klíč k mikronům
    // scv = (scw * wetD) / dryD
    const scv = (scw * wetD) / dryD;

    const compute = (thick) => {
        // Tloušťka mokrá (µm) = Suchá / SCV
        const wetThick = thick / scv;
        
        // Suché g/m2 = tloušťka (µm) * dryD
        const dryGm2 = thick * dryD;
        
        // Mokré g/m2 = dryGm2 / scw
        const wetGm2 = dryGm2 / scw;
        
        // Gramy na plechovku
        const dryG = dryGm2 * areaM2;
        const wetG = wetGm2 * areaM2;

        return { wetThick, dryGm2, wetGm2, dryG, wetG };
    };

    const min = compute(tMin);
    const max = compute(tMax);

    // Zobrazení plochy pro kontrolu
    document.getElementById('areaInfo').innerText = `Plocha: ${(totalAreaMm2/100).toFixed(2)} cm² (vč. dna)`;

    // Výstup do tabulky
    const rows = [
        ["Tloušťka suchá (µm)", tMin.toFixed(1), tMax.toFixed(1)],
        ["Tloušťka mokrá (µm)", min.wetThick.toFixed(1), max.wetThick.toFixed(1)],
        ["", "", ""], // oddělovač
        ["Suché g/m²", min.dryGm2.toFixed(2), max.dryGm2.toFixed(2)],
        ["Mokré g/m²", min.wetGm2.toFixed(2), max.wetGm2.toFixed(2)],
        ["", "", ""], // oddělovač
        ["Suché g / plechovka", min.dryG.toFixed(2), max.dryG.toFixed(2)],
        ["Mokré g / plechovka", min.wetG.toFixed(2), max.wetG.toFixed(2)]
    ];

    document.getElementById('resBody').innerHTML = rows.map(r => {
        if (r[0] === "") return `<tr style="height:10px"><td colspan="3"></td></tr>`;
        const isHighlight = r[0].includes("plechovka") ? "class='highlight'" : "";
        return `<tr ${isHighlight}>
            <td>${r[0]}</td>
            <td class="res-bold">${r[1]}</td>
            <td class="res-bold">${r[2]}</td>
        </tr>`;
    }).join('');

    document.getElementById('resultsCard').style.display = 'block';
}
</script>

</body>
</html>
