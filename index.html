<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VarnishCalc Pro - Global Support</title>
    <style>
        :root {
            --bg-dark: #050a18;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.12);
            --accent-purple: #a855f7;
            --accent-cyan: #06b6d4;
            --accent-green: #34d399;
            --accent-blue: #60a5fa;
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.5);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-dark);
            background-image: radial-gradient(circle at 10% 20%, rgba(168, 85, 247, 0.15) 0%, transparent 40%);
            color: var(--text-main);
            margin: 0; padding: 20px 15px;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .glass-card {
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 24px;
            padding: 24px; width: 100%; max-width: 450px; box-sizing: border-box;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); margin-bottom: 20px;
        }

        h1 { font-weight: 200; letter-spacing: -1px; margin: 10px 0 25px 0; font-size: 28px; text-align: center; }
        h1 b { font-weight: 800; color: var(--accent-cyan); }

        label { display: block; font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin: 0 0 6px 4px; }

        select, input {
            width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border);
            padding: 14px; border-radius: 14px; color: white; margin-bottom: 18px;
            font-size: 16px; box-sizing: border-box; outline: none; appearance: none;
        }

        .picker-container { position: relative; }
        .picker-container::after {
            content: '↓'; font-size: 12px; position: absolute; right: 15px; top: 15px; color: var(--text-dim); pointer-events: none;
        }

        .tab-bar {
            display: flex; background: var(--glass); padding: 5px; border-radius: 15px;
            width: 100%; max-width: 450px; margin-bottom: 20px;
        }
        .tab-btn {
            flex: 1; background: transparent; border: none; color: var(--text-dim);
            padding: 10px; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 600; transition: 0.3s;
        }
        .tab-btn.active { background: rgba(255,255,255,0.1); color: white; }

        .btn-main {
            width: 100%; padding: 18px; border-radius: 18px; border: none;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-cyan));
            color: white; font-weight: 800; font-size: 17px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3); transition: transform 0.2s;
        }
        .btn-main:active { transform: scale(0.98); }

        .main-result-banner {
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.15), rgba(6, 182, 212, 0.15));
            border-radius: 18px; padding: 20px; margin-bottom: 15px; text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .result-card-mini {
            background: rgba(255, 255, 255, 0.05); border-radius: 16px; padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1); text-align: center;
        }
        .result-card-mini .label { font-size: 9px; color: var(--text-dim); margin-bottom: 4px; }
        .result-card-mini .value { font-size: 19px; font-weight: 800; font-family: 'JetBrains Mono', monospace; }
        
        .highlight-green { color: var(--accent-green); }
        .highlight-blue { color: var(--accent-blue); }
        .footer-note { font-size: 11px; color: var(--text-dim); margin-top: 15px; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="glass-card" style="padding: 10px 20px; margin-bottom: 10px;">
        <select id="langPicker" onchange="setLang(this.value)" style="margin-bottom:0; padding:5px; font-size:12px; border:none; background:transparent;">
            <option value="cs">🇨🇿 Čeština</option>
            <option value="en">🇺🇸 English</option>
        </select>
    </div>

    <h1 id="appTitle">Varnish<b>Calc</b> Pro</h1>

    <div class="tab-bar">
        <button class="tab-btn active" id="tabCalc" onclick="switchTab('calc')">Kalkulátor</button>
        <button class="tab-btn" id="tabPlan" onclick="switchTab('plan')">Plánování</button>
    </div>

    <div id="calculatorSection" class="glass-card">
        <label id="lblType">Typ aplikace</label>
        <select id="coatingType" onchange="loadVarnishes()">
            <option value="internal">Interní (Vnitřní lak)</option>
            <option value="external">Externí (Vnější lak)</option>
        </select>

        <label id="lblVarnish">Specifikace laku</label>
        <div class="picker-container">
            <select id="varnishSelect"></select>
        </div>

        <div style="display: flex; gap: 15px;">
            <div style="flex:1">
                <label id="lblDiam">Průměr (mm)</label>
                <input type="number" id="diameter" value="35" step="0.1">
            </div>
            <div style="flex:1">
                <label id="lblLen">Délka (mm)</label>
                <input type="number" id="length" value="150" step="1">
            </div>
        </div>
        <button class="btn-main" id="btnCalculate" onclick="calculate()">SPUSTIT ANALÝZU</button>
    </div>

    <div id="planningSection" class="glass-card" style="display:none;">
        <label id="lblAvailable">Dostupné množství (kg)</label>
        <input type="number" id="availKg" placeholder="25.0" step="0.1">
        <button class="btn-main" id="btnPlan" onclick="calculatePlanning()">VÝPOČET KAPACITY</button>
    </div>

    <div id="resultsCard" class="glass-card" style="display:none; border-top: 2px solid var(--accent-cyan);">
        <h3 id="resTitle" style="margin-top:0; font-weight: 300; font-size: 16px;">Technický výstup</h3>
        <div id="resContent"></div>
    </div>

<script>
    const varnishes = {
        internal: [
            { id: 1, cat: "PAM alternative", name: "RLC15031", scv: 36.00, dryD: 1.37, wetD: 1.12, minT: 7, maxT: 11 },
            { id: 2, cat: "BPANI", name: "RLC10031/4", scv: 39.91, dryD: 1.26, wetD: 1.03, minT: 6, maxT: 10 },
            { id: 3, cat: "PAM alternative", name: "PPG8900-304A", scv: 40.59, dryD: 1.08, wetD: 1.03, minT: 6, maxT: 10 },
            { id: 4, cat: "PAM", name: "PPG8460", scv: 19.49, dryD: 1.38, wetD: 1.03, minT: 5, maxT: 15 },
            { id: 5, cat: "Epoxy", name: "PPG7940-301/B", scv: 31.04, dryD: 1.18, wetD: 1.02, minT: 7, maxT: 12 },
            { id: 6, cat: "Epoxy", name: "PPG3936-403/A", scv: 27.04, dryD: 1.31, wetD: 1.03, minT: 6, maxT: 14 },
            { id: 7, cat: "Epoxy", name: "J462 R003", scv: 34.35, dryD: 1.19, wetD: 1.01, minT: 5, maxT: 11 },
            { id: 8, cat: "BPANI", name: "32S23MC", scv: 25.6, dryD: 1.25, wetD: 1, minT: 5, maxT: 11 },
            { id: 9, cat: "BPANI", name: "2845-801D", scv: 31.44, dryD: 1.29, wetD: 1.07, minT: 8, maxT: 12 },
            { id: 10, cat: "Epoxy", name: "716315", scv: 42.05, dryD: 1.2, wetD: 1.2, minT: 10, maxT: 14.5 },
            { id: 11, cat: "Epoxy", name: "716307", scv: 32.0, dryD: 1.4, wetD: 1.1, minT: 10.7, maxT: 14.3 },
            { id: 12, cat: "BPANI", name: "32S39MJ", scv: 34.07, dryD: 1.25, wetD: 1.009, minT: 5, maxT: 10 }
        ],
        external: [
            { id: 1001, cat: "Overvarnish", name: "PFASNi (B 40) 75 KW 373/6 WB satin 30/70", scv: 59.1, dryD: 1.23, wetD: 1.04, minT: 10, maxT: 13 },
            { id: 1002, cat: "Overvarnish", name: "PFASNi (B 12) 75 KW 373/6 WB satin 70/30", scv: 56.7, dryD: 1.18, wetD: 1.02, minT: 10, maxT: 13 },
            { id: 1003, cat: "Overvarnish", name: "PFASNi (B 15) 75 KW 373/6 WB satin", scv: 59.1, dryD: 1.23, wetD: 1.04, minT: 10, maxT: 13 },
            { id: 1004, cat: "Overvarnish", name: "PFASNi (Gloss) 75 KW 373/6 WB", scv: 61.3, dryD: 1.17, wetD: 1.03, minT: 10, maxT: 12 },
            { id: 1005, cat: "Clear basecoat", name: "CLEAR SIZECOAT 72 KM 401", scv: 58.5, dryD: 1.17, wetD: 1.02, minT: 4, maxT: 7 },
            { id: 1006, cat: "Overvarnish", name: "(B 12) 75 KW 373/5 WB satin 70/30", scv: 58.3, dryD: 1.2, wetD: 1.03, minT: 10, maxT: 13 },
            { id: 1007, cat: "Overvarnish", name: "(B 40) 75 KW 373/5 WB satin 30/70", scv: 60.5, dryD: 1.21, wetD: 1.04, minT: 10, maxT: 13 },
            { id: 1008, cat: "Overvarnish", name: "(B 15) 75 KW 373/5 WB satin", scv: 60.5, dryD: 1.21, wetD: 1.04, minT: 10, maxT: 13 },
            { id: 1009, cat: "White Enamel", name: "WHITE ENAMEL T1195", scv: 95.6, dryD: 1.98, wetD: 1.47, minT: 10, maxT: 20 },
            { id: 1010, cat: "Overvarnish", name: "(Gloss) 75 KW 373/5 WB", scv: 61.3, dryD: 1.17, wetD: 1.03, minT: 10, maxT: 12 }
        ]
    };

    const translations = {
        cs: { title: "Varnish<b>Calc</b> Pro", type: "Typ aplikace", varnish: "Specifikace laku", diam: "Průměr (mm)", len: "Délka (mm)", calc: "SPUSTIT ANALÝZU", area: "Celková plocha", wet: "Mokrý nános", dry: "Suchý nános", plan: "Plánování", prod: "Výtěžnost výroby" },
        en: { title: "Varnish<b>Calc</b> Pro", type: "Application Type", varnish: "Varnish Specification", diam: "Diameter (mm)", len: "Length (mm)", calc: "RUN ANALYSIS", area: "Total Area", wet: "Wet weight", dry: "Dry weight", plan: "Planning", prod: "Production Yield" }
    };

    let currentLang = 'cs';

    function setLang(l) { currentLang = l; updateTexts(); loadVarnishes(); }

    function updateTexts() {
        const t = translations[currentLang];
        document.getElementById('appTitle').innerHTML = t.title;
        document.getElementById('lblType').innerText = t.type;
        document.getElementById('lblVarnish').innerText = t.varnish;
        document.getElementById('lblDiam').innerText = t.diam;
        document.getElementById('lblLen').innerText = t.len;
        document.getElementById('btnCalculate').innerText = t.calc;
        document.getElementById('tabCalc').innerText = (currentLang === 'cs' ? 'Kalkulátor' : 'Calculator');
        document.getElementById('tabPlan').innerText = t.plan;
    }

    function switchTab(tab) {
        document.getElementById('calculatorSection').style.display = tab === 'calc' ? 'block' : 'none';
        document.getElementById('planningSection').style.display = tab === 'plan' ? 'block' : 'none';
        document.getElementById('tabCalc').classList.toggle('active', tab === 'calc');
        document.getElementById('tabPlan').classList.toggle('active', tab === 'plan');
    }

    function loadVarnishes() {
        const type = document.getElementById('coatingType').value;
        const select = document.getElementById('varnishSelect');
        const data = varnishes[type];
        const categories = [...new Set(data.map(v => v.cat))];
        
        select.innerHTML = categories.map(cat => `
            <optgroup label="${cat}">
                ${data.filter(v => v.cat === cat).map(v => 
                    `<option value='${JSON.stringify(v)}'>${v.name}</option>`
                ).join('')}
            </optgroup>
        `).join('');
    }

    function calculate() {
        const v = JSON.parse(document.getElementById('varnishSelect').value);
        const d = parseFloat(document.getElementById('diameter').value);
        const l = parseFloat(document.getElementById('length').value);
        const type = document.getElementById('coatingType').value;

        const areaMm2 = (type === 'internal') 
            ? (Math.PI * d * l) + (Math.PI * Math.pow(d, 2) / 4)
            : (Math.PI * d * l);
        
        const areaM2 = areaMm2 / 1000000;

        const getAnalysis = (T_dry) => {
            const T_wet = T_dry / (v.scv / 100);
            const weight_dry = T_dry * v.dryD * areaM2;
            const weight_wet = T_wet * v.wetD * areaM2;
            return { wetThick: T_wet, dryG: weight_dry, wetG: weight_wet };
        };

        const resMin = getAnalysis(v.minT);
        const resMax = getAnalysis(v.maxT);
        updateResultUI(resMin, resMax, areaMm2, v);
    }

    function updateResultUI(min, max, area, v) {
        const t = translations[currentLang];
        document.getElementById('resContent').innerHTML = `
            <div class="main-result-banner">
                <span style="font-size: 11px; color: var(--text-dim); text-transform:uppercase;">${t.area}</span>
                <div style="font-size: 24px; font-weight: 800;">${(area/100).toFixed(2)} cm²</div>
                <div style="font-size: 11px; opacity: 0.6; margin-top: 4px;">Kategorie: ${v.cat} | SCV: ${v.scv}%</div>
            </div>
            <div class="result-grid">
                <div class="result-card-mini" style="grid-column: span 2; background: rgba(255,255,255,0.03); padding: 8px;">
                    <span style="font-size: 10px; color: var(--accent-cyan)">LIMIT MIN: ${v.minT} µm (Mokrá: ${min.wetThick.toFixed(1)} µm)</span>
                </div>
                <div class="result-card-mini">
                    <span class="label">${t.dry}</span>
                    <span class="value highlight-blue">${(min.dryG * 1000).toFixed(0)}<small>mg</small></span>
                </div>
                <div class="result-card-mini">
                    <span class="label">${t.wet}</span>
                    <span class="value highlight-green">${(min.wetG * 1000).toFixed(0)}<small>mg</small></span>
                </div>
                <div class="result-card-mini" style="grid-column: span 2; background: rgba(255,255,255,0.03); padding: 8px; margin-top:10px;">
                    <span style="font-size: 10px; color: var(--accent-cyan)">LIMIT MAX: ${v.maxT} µm (Mokrá: ${max.wetThick.toFixed(1)} µm)</span>
                </div>
                <div class="result-card-mini">
                    <span class="label">${t.dry}</span>
                    <span class="value highlight-blue">${(max.dryG * 1000).toFixed(0)}<small>mg</small></span>
                </div>
                <div class="result-card-mini">
                    <span class="label">${t.wet}</span>
                    <span class="value highlight-green">${(max.wetG * 1000).toFixed(0)}<small>mg</small></span>
                </div>
            </div>
        `;
        document.getElementById('resultsCard').style.display = 'block';
    }

    // Inicializace
    updateTexts();
    loadVarnishes();
</script>
</body>
</html>
