<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VarnishCalc Pro</title>
    <style>
        :root {
            --bg-dark: #050a18;
            --glass: rgba(255, 255, 255, 0.08);
            --accent-purple: #a855f7;
            --accent-cyan: #06b6d4;
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg-dark);
            background-image: radial-gradient(circle at 20% 30%, #1e1b4b 0%, transparent 40%),
                              radial-gradient(circle at 80% 70%, #1e293b 0%, transparent 40%);
            color: var(--text-main);
            margin: 0; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            padding: 20px;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 24px;
            width: 100%; max-width: 450px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        .lang-bar {
            display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px;
        }

        .lang-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 6px 12px; border-radius: 10px; cursor: pointer; font-size: 12px;
        }

        .lang-btn.active { background: var(--accent-purple); border-color: var(--accent-purple); }

        select, input {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2);
            padding: 14px; border-radius: 12px; color: white; margin: 10px 0 20px 0; font-size: 16px;
        }

        .btn-calc {
            width: 100%; padding: 16px; border-radius: 16px; border: none;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-cyan));
            color: white; font-weight: 700; font-size: 18px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
        }

        .result-item {
            display: flex; justify-content: space-between; padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        h1 { font-weight: 200; letter-spacing: -1px; margin-bottom: 30px; }
        h1 b { font-weight: 800; }
        label { font-size: 13px; color: var(--text-dim); text-transform: uppercase; margin-left: 5px; }
    </style>
</head>
<body>

    <div class="lang-bar" id="langBar"></div>

    <h1 id="appTitle">Varnish<b>Calc</b> Pro</h1>

    <div class="glass-card">
        <label id="lblCoating">Typ nátěru</label>
        <select id="coatingType" onchange="initApp()">
            <option value="internal">Internal</option>
            <option value="external">External</option>
        </select>

        <label id="lblVarnish">Výběr laku</label>
        <select id="varnishSelect"></select>

        <label id="lblDiameter">Průměr tuby (mm)</label>
        <input type="number" id="diameter" placeholder="35" step="0.1">

        <label id="lblLength">Délka tuby (mm)</label>
        <input type="number" id="length" placeholder="150" step="0.1">

        <button class="btn-calc" onclick="runCalc()" id="btnCalculate">Vypočítat</button>
    </div>

    <div id="resultsCard" class="glass-card" style="display:none; border-top: 3px solid var(--accent-cyan);">
        <h3 id="resTitle">Výsledky analýzy</h3>
        <div id="resultContent"></div>
    </div>

<script>
    const translations = {
        en: { title: "Varnish<b>Calc</b> Pro", coating: "Coating Type", varnish: "Select Varnish", diameter: "Diameter (mm)", length: "Length (mm)", calc: "Calculate", results: "Analysis Results", area: "Area", wet: "Wet Weight", scv: "SCV" },
        cs: { title: "Varnish<b>Calc</b> Pro", coating: "Typ nátěru", varnish: "Vybrat lak", diameter: "Průměr (mm)", length: "Délka (mm)", calc: "Vypočítat", results: "Výsledky analýzy", area: "Plocha", wet: "Mokrý nános", scv: "SCV" },
        nl: { title: "Varnish<b>Calc</b> Pro", coating: "Type coating", varnish: "Lak selecteren", diameter: "Diameter (mm)", length: "Lengte (mm)", calc: "Berekenen", results: "Analyseresultaten", area: "Oppervlakte", wet: "Nat gewicht", scv: "SCV" }, // Belgie/Lummen
        fr: { title: "Varnish<b>Calc</b> Pro", coating: "Type de revêtement", varnish: "Choisir vernis", diameter: "Diamètre (mm)", length: "Longueur (mm)", calc: "Calculer", results: "Résultats", area: "Surface", wet: "Poids humide", scv: "SCV" },
        uk: { title: "Varnish<b>Calc</b> Pro", coating: "Тип покриття", varnish: "Вибрати лак", diameter: "Діаметр (mm)", length: "Довжина (mm)", calc: "Розрахувати", results: "Результати", area: "Площа", wet: "Мокра вага", scv: "SCV" }
        // ... sem doplníme zbytek (PT, ES, SK, AR)
    };

    let currentLang = 'en';

    const varnishes = {
        internal: [
            { name: "RLC15031", sc: 36.00, wetD: 1.12, dryD: 1.37, minT: 7, maxT: 11 },
            { name: "RLC10031/4", sc: 39.91, wetD: 1.03, dryD: 1.26, minT: 6, maxT: 10 }
        ],
        external: [
            { name: "PFASNi (B 40)", sc: 59.10, wetD: 1.04, dryD: 1.23, minT: 10, maxT: 13 }
        ]
    };

    function initApp() {
        const bar = document.getElementById('langBar');
        bar.innerHTML = Object.keys(translations).map(l => 
            `<button class="lang-btn ${l===currentLang?'active':''}" onclick="setLang('${l}')">${l.toUpperCase()}</button>`
        ).join('');

        const type = document.getElementById('coatingType').value;
        const select = document.getElementById('varnishSelect');
        select.innerHTML = varnishes[type].map(v => `<option value='${JSON.stringify(v)}'>${v.name}</option>`).join('');
        
        updateTexts();
    }

    function setLang(l) { currentLang = l; initApp(); }

    function updateTexts() {
        const t = translations[currentLang];
        document.getElementById('appTitle').innerHTML = t.title;
        document.getElementById('lblCoating').innerText = t.coating;
        document.getElementById('lblVarnish').innerText = t.varnish;
        document.getElementById('lblDiameter').innerText = t.diameter;
        document.getElementById('lblLength').innerText = t.length;
        document.getElementById('btnCalculate').innerText = t.calc;
        document.getElementById('resTitle').innerText = t.results;
    }

    function runCalc() {
        const v = JSON.parse(document.getElementById('varnishSelect').value);
        const d = parseFloat(document.getElementById('diameter').value);
        const l = parseFloat(document.getElementById('length').value);
        const type = document.getElementById('coatingType').value;

        if(!d || !l) return;

        // ANALÝZA (vaše Swift logika)
        const area = (Math.PI * d * l) + (type === 'internal' ? (Math.PI * Math.pow(d, 2) / 4) : 0);
        const scv = (v.sc / 100) * (v.wetD / v.dryD) * 100;
        const areaCm2 = area / 100;
        const minWet = (v.minT / 10000) * (100 / scv) * v.wetD * areaCm2 * 1000; // mg

        document.getElementById('resultsCard').style.display = 'block';
        const t = translations[currentLang];
        document.getElementById('resultContent').innerHTML = `
            <div class="result-item"><span>${t.area}</span><b>${(area/100).toFixed(2)} cm²</b></div>
            <div class="result-item"><span>${t.scv}</span><b>${scv.toFixed(2)} %</b></div>
            <div class="result-item"><span>${t.wet} (Min)</span><b style="color:var(--accent-cyan)">${minWet.toFixed(1)} mg</b></div>
        `;
    }

    initApp();
</script>
</body>
</html>
