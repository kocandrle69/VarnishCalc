<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VarnishCalc Pro</title>
    <style>
        :root {
            --bg-dark: #050a18;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.12);
            --accent-purple: #a855f7;
            --accent-cyan: #06b6d4;
            --accent-green: #10b981;
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.5);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            background-image: radial-gradient(circle at 10% 20%, rgba(168, 85, 247, 0.15) 0%, transparent 40%);
            color: var(--text-main);
            margin: 0; padding: 20px 15px;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .glass-card {
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 24px;
            padding: 24px; width: 100%; max-width: 450px; box-sizing: border-box;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); margin-bottom: 20px;
        }

        h1 { font-weight: 200; letter-spacing: -1px; margin: 10px 0 25px 0; font-size: 28px; text-align: center; }
        h1 b { font-weight: 800; }

        label { display: block; font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin: 0 0 6px 4px; }

        select, input {
            width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border);
            padding: 14px; border-radius: 14px; color: white; margin-bottom: 18px;
            font-size: 16px; box-sizing: border-box; outline: none; appearance: none;
        }

        .picker-container { position: relative; }
        .picker-container::after {
            content: '▼'; font-size: 10px; position: absolute; right: 15px; top: 40px; color: var(--text-dim); pointer-events: none;
        }

        .tab-bar {
            display: flex; background: var(--glass); padding: 5px; border-radius: 15px;
            width: 100%; max-width: 450px; margin-bottom: 20px;
        }
        .tab-btn {
            flex: 1; background: transparent; border: none; color: var(--text-dim);
            padding: 10px; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 600;
        }
        .tab-btn.active { background: rgba(255,255,255,0.1); color: white; }

        .btn-main {
            width: 100%; padding: 18px; border-radius: 18px; border: none;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-cyan));
            color: white; font-weight: 800; font-size: 17px; cursor: pointer;
        }

        .result-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
        .res-label { color: var(--text-dim); font-size: 14px; }
        .res-val { font-weight: 700; font-family: monospace; color: var(--accent-green); }

        [dir="rtl"] { text-align: right; }
    </style>
</head>
<body>

    <div class="glass-card" style="padding: 15px; margin-bottom: 15px;">
        <label id="lblLang">Language / Jazyk</label>
        <div class="picker-container">
            <select id="langPicker" onchange="setLang(this.value)" style="margin-bottom: 0;">
                <option value="en">English</option>
                <option value="cs">Čeština</option>
                <option value="sk">Slovenčina</option>
                <option value="nl">Vlaams (NL)</option>
                <option value="fr">Français</option>
                <option value="pt">Português</option>
                <option value="es">Español</option>
                <option value="uk">Українська</option>
                <option value="ar">العربية</option>
            </select>
        </div>
    </div>

    <h1 id="appTitle">Varnish<b>Calc</b> Pro</h1>

    <div class="tab-bar">
        <button class="tab-btn active" id="tabCalc" onclick="switchTab('calc')">Calculator</button>
        <button class="tab-btn" id="tabPlan" onclick="switchTab('plan')">Planning</button>
    </div>

    <div id="calculatorSection" class="glass-card">
        <label id="lblType">Coating Type</label>
        <select id="coatingType" onchange="loadVarnishes()">
            <option value="internal">Internal Coating</option>
            <option value="external">External Coating</option>
        </select>

        <label id="lblVarnish">Varnish</label>
        <div class="picker-container">
            <select id="varnishSelect"></select>
        </div>

        <div style="display: flex; gap: 15px;">
            <div style="flex:1">
                <label id="lblDiam">Diameter (mm)</label>
                <input type="number" id="diameter" value="35">
            </div>
            <div style="flex:1">
                <label id="lblLen">Length (mm)</label>
                <input type="number" id="length" value="150">
            </div>
        </div>
        <button class="btn-main" id="btnCalculate" onclick="calculate()">Calculate</button>
    </div>

    <div id="planningSection" class="glass-card" style="display:none;">
        <label id="lblAvailable">Available Varnish (kg)</label>
        <input type="number" id="availKg" placeholder="20">
        <button class="btn-main" id="btnPlan" onclick="calculatePlanning()">Calculate Production</button>
    </div>

    <div id="resultsCard" class="glass-card" style="display:none; border-left: 4px solid var(--accent-cyan);">
        <h3 id="resTitle" style="margin-top:0">Analysis</h3>
        <div id="resContent"></div>
    </div>

<script>
    // --- DATABASE ---
    const varnishes = {
        internal: [
            { id: 1, name: "RLC15031", sc: 36.00, wetD: 1.12, dryD: 1.37, minT: 7, maxT: 11 },
            { id: 2, name: "RLC10031/4", sc: 39.91, wetD: 1.03, dryD: 1.26, minT: 6, maxT: 10 },
            { id: 3, name: "PPG8900-304A", sc: 40.59, wetD: 1.03, dryD: 1.08, minT: 6, maxT: 10 },
            { id: 4, name: "PPG8460", sc: 19.49, wetD: 1.03, dryD: 1.38, minT: 5, maxT: 15 },
            { id: 5, name: "PPG7940-301/B", sc: 31.04, wetD: 1.02, dryD: 1.18, minT: 7, maxT: 12 },
            { id: 6, name: "PPG3936-403/A", sc: 27.04, wetD: 1.03, dryD: 1.31, minT: 6, maxT: 14 },
            { id: 7, name: "J462 R003", sc: 34.35, wetD: 1.01, dryD: 1.19, minT: 5, maxT: 11 },
            { id: 8, name: "32S23MC", sc: 25.60, wetD: 1.00, dryD: 1.25, minT: 5, maxT: 11 },
            { id: 9, name: "2845-801D", sc: 31.44, wetD: 1.07, dryD: 1.29, minT: 8, maxT: 12 },
            { id: 10, name: "716315", sc: 42.05, wetD: 1.20, dryD: 1.20, minT: 10, maxT: 14.5 },
            { id: 11, name: "716307", sc: 32.00, wetD: 1.10, dryD: 1.40, minT: 10.71, maxT: 14.29 },
            { id: 12, name: "32S39MJ", sc: 34.07, wetD: 1.009, dryD: 1.25, minT: 5, maxT: 10 }
        ],
        external: [
            { id: 1001, name: "PFASNi (B 40) 75 KW 373/6 WB", sc: 59.1, wetD: 1.04, dryD: 1.23, minT: 10, maxT: 13 },
            { id: 1002, name: "PFASNi (B 12) 75 KW 373/6 WB", sc: 56.7, wetD: 1.02, dryD: 1.18, minT: 10, maxT: 13 },
            { id: 1003, name: "PFASNi (B 15) 75 KW 373/6 WB", sc: 59.1, wetD: 1.04, dryD: 1.23, minT: 10, maxT: 13 },
            { id: 1004, name: "PFASNi (Gloss) 75 KW 373/6 WB", sc: 61.3, wetD: 1.03, dryD: 1.17, minT: 10, maxT: 12 },
            { id: 1005, name: "CLEAR SIZECOAT 72 KM 401", sc: 58.5, wetD: 1.02, dryD: 1.17, minT: 4, maxT: 7 },
            { id: 1006, name: "(B 12) 75 KW 373/5 WB", sc: 58.3, wetD: 1.03, dryD: 1.20, minT: 10, maxT: 13 },
            { id: 1007, name: "(B 40) 75 KW 373/5 WB", sc: 60.5, wetD: 1.04, dryD: 1.21, minT: 10, maxT: 13 },
            { id: 1008, name: "(B 15) 75 KW 373/5 WB", sc: 60.5, wetD: 1.04, dryD: 1.21, minT: 10, maxT: 13 },
            { id: 1009, name: "WHITE ENAMEL T1195", sc: 95.6, wetD: 1.47, dryD: 1.98, minT: 10, maxT: 20 },
            { id: 1010, name: "(Gloss) 75 KW 373/5 WB", sc: 61.3, wetD: 1.03, dryD: 1.17, minT: 10, maxT: 12 }
        ]
    };

    const translations = {
        en: { title: "Varnish<b>Calc</b> Pro", type: "Coating Type", varnish: "Varnish", diam: "Diameter (mm)", len: "Length (mm)", calc: "Calculate", results: "Results", area: "Total Area", scv: "SCV", wet: "Wet Weight", plan: "Planning", prod: "Pieces", internal: "Internal", external: "External" },
        cs: { title: "Varnish<b>Calc</b> Pro", type: "Typ nátěru", varnish: "Lak", diam: "Průměr (mm)", len: "Délka (mm)", calc: "Vypočítat", results: "Výsledky", area: "Celková plocha", scv: "SCV", wet: "Mokrý nános", plan: "Plánování", prod: "Kusů", internal: "Vnitřní", external: "Vnější" },
        sk: { title: "Varnish<b>Calc</b> Pro", type: "Typ náteru", varnish: "Lak", diam: "Priemer (mm)", len: "Dĺžka (mm)", calc: "Vypočítať", results: "Výsledky", area: "Celková plocha", scv: "SCV", wet: "Mokrý nános", plan: "Plánovanie", prod: "Kusov", internal: "Vnútorné", external: "Vonkajšie" },
        nl: { title: "Varnish<b>Calc</b> Pro", type: "Type coating", varnish: "Lak", diam: "Diameter (mm)", len: "Lengte (mm)", calc: "Berekenen", results: "Resultaten", area: "Oppervlakte", scv: "SCV", wet: "Nat gewicht", plan: "Planning", prod: "Stuks", internal: "Interne", external: "Externe" },
        ar: { title: "Varnish<b>Calc</b> Pro", type: "نوع الطلاء", varnish: "الورنيش", diam: "القطر", len: "الطول", calc: "احسب", results: "النتائج", area: "المساحة", scv: "SCV", wet: "الوزن الرطب", plan: "التخطيط", prod: "قطع", internal: "داخلي", external: "خارجي", dir: "rtl" }
    };

    let currentLang = 'en';

    function setLang(l) {
        currentLang = l;
        document.body.dir = translations[l]?.dir || 'ltr';
        updateTexts();
    }

    function updateTexts() {
        const t = translations[currentLang] || translations['en'];
        document.getElementById('appTitle').innerHTML = t.title;
        document.getElementById('lblType').innerText = t.type;
        document.getElementById('lblVarnish').innerText = t.varnish;
        document.getElementById('lblDiam').innerText = t.diam;
        document.getElementById('lblLen').innerText = t.len;
        document.getElementById('btnCalculate').innerText = t.calc;
        document.getElementById('tabCalc').innerText = t.calc;
        document.getElementById('tabPlan').innerText = t.plan;
        
        const typeSelect = document.getElementById('coatingType');
        typeSelect.options[0].text = t.internal;
        typeSelect.options[1].text = t.external;
    }

    function switchTab(tab) {
        document.getElementById('calculatorSection').style.display = tab === 'calc' ? 'block' : 'none';
        document.getElementById('planningSection').style.display = tab === 'plan' ? 'block' : 'none';
        document.getElementById('tabCalc').classList.toggle('active', tab === 'calc');
        document.getElementById('tabPlan').classList.toggle('active', tab === 'plan');
    }

    function loadVarnishes() {
        const type = document.getElementById('coatingType').value;
        const select = document.getElementById('varnishSelect');
        select.innerHTML = varnishes[type].map(v => `<option value='${JSON.stringify(v)}'>${v.name}</option>`).join('');
    }

    function calculate() {
        const v = JSON.parse(document.getElementById('varnishSelect').value);
        const d = parseFloat(document.getElementById('diameter').value);
        const l = parseFloat(document.getElementById('length').value);
        const type = document.getElementById('coatingType').value;

        const sideArea = Math.PI * d * l;
        const bottomArea = (Math.PI * Math.pow(d, 2)) / 4;
        const area = (type === 'internal') ? (sideArea + bottomArea) : sideArea;
        const scv = (v.sc / 100) * (v.wetD / v.dryD) * 100;
        
        const calcWet = (thick) => (thick / 10000) * (100 / scv) * v.wetD * (area/100) * 1000;

        const t = translations[currentLang] || translations['en'];
        document.getElementById('resContent').innerHTML = `
            <div class="result-row"><span class="res-label">${t.area}</span><span class="res-val">${(area/100).toFixed(2)} cm²</span></div>
            <div class="result-row"><span class="res-label">${t.scv}</span><span class="res-val">${scv.toFixed(2)} %</span></div>
            <div class="result-row"><span class="res-label">${t.wet} (${v.minT}μ)</span><span class="res-val">${calcWet(v.minT).toFixed(1)} mg</span></div>
            <div class="result-row"><span class="res-label">${t.wet} (${v.maxT}μ)</span><span class="res-val">${calcWet(v.maxT).toFixed(1)} mg</span></div>
        `;
        document.getElementById('resultsCard').style.display = 'block';
    }

    function calculatePlanning() {
        const v = JSON.parse(document.getElementById('varnishSelect').value);
        const kg = parseFloat(document.getElementById('availKg').value);
        const d = parseFloat(document.getElementById('diameter').value);
        const l = parseFloat(document.getElementById('length').value);
        const type = document.getElementById('coatingType').value;

        const areaCm2 = ((type === 'internal') ? (Math.PI*d*l + (Math.PI*d*d/4)) : (Math.PI*d*l)) / 100;
        const scv = (v.sc / 100) * (v.wetD / v.dryD) * 100;
        const wetGMin = (v.minT / 10000) * (100 / scv) * v.wetD * areaCm2;
        const wetGMax = (v.maxT / 10000) * (100 / scv) * v.wetD * areaCm2;
        
        const t = translations[currentLang] || translations['en'];
        document.getElementById('resContent').innerHTML = `
            <div class="result-row"><span class="res-label">${t.prod} (min thickness)</span><span class="res-val">${Math.floor((kg*1000)/wetGMin).toLocaleString()}</span></div>
            <div class="result-row"><span class="res-label">${t.prod} (max thickness)</span><span class="res-val">${Math.floor((kg*1000)/wetGMax).toLocaleString()}</span></div>
        `;
        document.getElementById('resultsCard').style.display = 'block';
    }

    loadVarnishes();
    updateTexts();
</script>
</body>
</html>
